name: SessionFlow SaaS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './sessionflow-ui/package-lock.json'
      - name: Install dependencies
        working-directory: ./sessionflow-ui
        run: npm ci
      - name: Build frontend
        working-directory: ./sessionflow-ui
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./sessionflow-ui/dist

  build-backend:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./SessionFlow.Desktop/wwwroot
      - name: Restore dependencies
        working-directory: ./SessionFlow.Desktop
        run: dotnet restore
      - name: Build
        working-directory: ./SessionFlow.Desktop
        run: dotnet build --configuration Release --no-restore
      - name: Publish
        working-directory: ./SessionFlow.Desktop
        run: dotnet publish --configuration Release --no-build -o ../dist/SessionFlow
